<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #0390d6;
        }

        p {
            color: #555;
        }

        button {
            background: #0393d6;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #024ea2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to my Website</h1>

        <p>
            This website is automatically deployed using
            <strong>GitHub Actions</strong>.
        </p>

        <button onclick="window.open('https://github.com/Omsongire23', '_blank')">
            Visit My GitHub
        </button>
    </div>

</body>
</html>
